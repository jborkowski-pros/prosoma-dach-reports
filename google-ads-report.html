async function decrypt(e){
  e.preventDefault();
  const p=document.getElementById("pw").value;
  const d=JSON.parse(D);
  try{
    const salt=Uint8Array.from(atob(d.salt),c=>c.charCodeAt(0));
    const iv=Uint8Array.from(atob(d.iv),c=>c.charCodeAt(0));
    const ct=Uint8Array.from(atob(d.ct),c=>c.charCodeAt(0));
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey("raw",enc.encode(p),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:d.iter,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(x){
    document.getElementById("err").style.display="block";
  }
  return false;
}
